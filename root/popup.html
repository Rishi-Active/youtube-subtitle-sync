<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouTube Subtitle Sync</title>
  <style>
    :root {
      --bg: #181818;
      --card-bg: #282828;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --accent: #FF0000;
      --accent-hover: #cc0000;
      --border: #3f3f3f;
      --radius: 8px;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .header img {
      width: 24px;
      height: 24px;
      margin-right: 12px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .offset-display {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      margin: 10px 0 20px;
      color: var(--accent);
      font-family: monospace;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: #3f3f3f;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #4f4f4f;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-minus {
      border-left: 3px solid #ff4444;
    }

    .btn-plus {
      border-left: 3px solid #00C851;
    }

    .btn-reset {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-top: 5px;
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }
    
    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-row input[type="range"] {
      width: 120px;
      accent-color: var(--accent);
    }
    
    select {
      background: #333;
      color: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px;
      font-size: 12px;
    }

    .footer {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
    }

    .shortcut-hint {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    kbd {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 2px 5px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon.png" alt="Logo">
    <h1>Subtitle Sync</h1>
  </div>

  <div class="card" style="padding-bottom: 8px;">
    <div style="font-size: 13px; color: var(--text-muted); text-align: center;">Timing Offset:</div>
    <div id="offset-display" class="offset-display">0.0s</div>

    <div class="controls-grid">
      <div class="btn-group">
        <button id="btn-minus-05" class="btn-minus">- 0.5s</button>
        <button id="btn-minus-01" class="btn-minus">- 0.1s</button>
      </div>
      <div class="btn-group">
        <button id="btn-plus-05" class="btn-plus">+ 0.5s</button>
        <button id="btn-plus-01" class="btn-plus">+ 0.1s</button>
      </div>
    </div>
    
    <div style="display: flex; gap: 8px; margin-bottom: 5px;">
      <input type="number" id="custom-offset-input" step="0.1" placeholder="e.g. 1.5" style="flex: 1; background: #333; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 6px; text-align: center;" title="Custom offset in seconds">
      <button id="btn-apply-custom" style="padding: 6px 12px; background: var(--accent); border-left: none;">Set</button>
    </div>

    <button id="btn-reset" class="btn-reset">Reset Timing</button>
  </div>

  <div class="card">
    <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px; font-weight: bold;">Custom Styling</div>
    
    <div class="setting-row">
      <label>Font Size</label>
      <input type="range" id="setting-font-size" min="50" max="200" value="100">
    </div>
    <div class="setting-row">
      <label>Vertical Position</label>
      <input type="range" id="setting-position" min="0" max="80" value="5">
    </div>
    <div class="setting-row">
      <label>Line Spacing</label>
      <input type="range" id="setting-spacing" min="100" max="200" value="120">
    </div>
    <div class="setting-row">
      <label>Alignment</label>
      <select id="setting-align">
        <option value="center">Center</option>
        <option value="left">Left</option>
        <option value="right">Right</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Hide Native Subtitles</label>
      <input type="checkbox" id="setting-hide-native" checked>
    </div>
  </div>

  <div class="footer">
    <div id="status-text">Ready</div>
    <div class="shortcut-hint">
      Shortcuts: <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>←</kbd> / <kbd>→</kbd>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
